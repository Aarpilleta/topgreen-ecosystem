name: Daily Database Backup

on:
  schedule:
    - cron: '0 5 * * *' # Runs daily at 5:00 AM UTC (11:00 PM local salon time)
  workflow_dispatch: # Allows manual trigger

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Dump Database via pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Error: DATABASE_URL secret is not set in GitHub Repository Secrets."
            exit 1
          fi
          # Extract host from DATABASE_URL and test connection first
          echo "Testing database connection..."
          pg_isready -d "$DATABASE_URL" -t 15
          
          echo "Running pg_dump..."
          pg_dump "$DATABASE_URL" -F c -b -v -f backup.dump
          echo "Database dump completed successfully."

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.event.repository.name }}-${{ github.run_id }}
          path: backup.dump
          retention-days: 30 # Retain backups for 30 days
